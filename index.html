<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pingu Quest: Fixed & Transparent</title>
    <style>
        :root { --p-blue: #00A8FF; --p-yellow: #FFCE00; --p-pink: #FF4D91; --p-green: #4CD137; }
        body { background: #E0F7FA; font-family: 'Comic Sans MS', cursive; margin: 0; overflow-x: hidden; touch-action: none; user-select: none; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* --- Harta Map Style --- */
        #map-container { width: 100%; position: relative; padding: 50px 0; background: #b2ebf2; border-bottom: 10px solid #81d4fa; }
        .level-node { width: 70px; height: 70px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; border: 6px solid #ccc; position: relative; z-index: 5; margin-bottom: 50px; box-shadow: 0 8px 0 rgba(0,0,0,0.15); cursor: pointer; color: #999; transition: 0.3s; }
        .level-unlocked { border-color: var(--p-blue); color: var(--p-blue); }
        .level-current { border-color: var(--p-green); background: var(--p-green); color: white; scale: 1.1; box-shadow: 0 0 20px var(--p-green); }
        
        /* --- Personaj Pinguin TRANSPARENT & ANIMAT --- */
        #penguin-avatar {
            position: absolute; width: 100px; height: 100px; z-index: 10; pointer-events: none;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            /* Creăm pinguinul din cod (fără imagine externă) */
            background: #222; border-radius: 50% 50% 40% 40%;
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.3));
            animation: pingu-pulse 2s infinite ease-in-out;
        }
        /* Detalii pinguin (burtica, ochi) */
        #penguin-avatar::after { content: ''; position: absolute; top: 30px; left: 20px; width: 60px; height: 50px; background: white; border-radius: 50%; }
        #penguin-avatar::before { content: '👀'; position: absolute; top: 15px; left: 35px; font-size: 24px; z-index: 11; }
        /* Ghiozdanul pe spate */
        #pingu-bag { position: absolute; top: 30px; left: -15px; width: 30px; height: 40px; background: #FF4D91; border-radius: 10px; border: 3px solid #b71c1c; z-index: 5; }

        @keyframes pingu-pulse { 0%, 100% { scale: 1; } 50% { scale: 1.05; } }
        .wobble-anim { animation: waddle 0.7s ease-in-out; }
        @keyframes waddle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }

        /* --- Puzzle Game Style (DRAG & DROP FIX) --- */
        #game-area { display: flex; flex-direction: column; align-items: center; margin-top: 10px; position: relative; width: 100%; padding-bottom: 250px;}
        #puzzle-slots { display: grid; grid-template-columns: repeat(3, 105px); grid-template-rows: repeat(3, 105px); gap: 6px; border: 10px solid white; border-radius: 20px; background: rgba(255,255,255,0.7); padding: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .slot { width: 105px; height: 105px; background: rgba(255,255,255,0.4); border-radius: 12px; border: 2px dashed rgba(0,0,0,0.15); box-sizing: border-box; }
        
        #pieces-container { width: 90%; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; position: relative; min-height: 200px; }
        .piece { width: 105px; height: 105px; background-size: 315px 315px; border-radius: 12px; cursor: grab; touch-action: none; box-shadow: 0 5px 10px rgba(0,0,0,0.2); position: absolute; z-index: 10; transition: transform 0.1s, box-shadow 0.1s; }
        .piece:active { cursor: grabbing; scale: 1.1; z-index: 1000; box-shadow: 0 12px 24px rgba(0,0,0,0.3); }

        /* UI */
        .top-bar { width: 100%; height: 60px; background: white; display: flex; justify-content: space-around; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 3px 15px rgba(0,0,0,0.1); }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-size: 22px; font-weight:bold; color:#333;">⭐ <span id="stars-val">0</span></div>
        <button class="btn" style="background:var(--p-pink)" onclick="claimDaily()">🎁 CADOU</button>
        <button class="btn" style="background:var(--p-blue)" onclick="showScreen('screen-map')">🗺️ HARTĂ</button>
    </div>

    <div id="screen-map" class="screen active">
        <h1 style="color:var(--p-blue); margin: 20px; text-shadow: 2px 2px 0 white;">Pingu Aventura 🐧</h1>
        <div id="map-container">
            <div id="penguin-avatar"><div id="pingu-bag"></div></div>
            <div id="levels-path" style="width:100%;"></div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div id="animal-msg" style="margin:15px; background:white; padding:12px 25px; border-radius:20px; border:3px solid var(--p-pink); font-weight:bold; color:#d81b60; font-size:20px;"></div>
        <div id="game-area">
            <div id="puzzle-slots"></div>
            <div id="pieces-container"></div> </div>
        <div style="position:fixed; bottom: 20px; z-index:1001;">
            <button class="btn" style="background:var(--p-blue); padding: 10px 40px;" onclick="showScreen('screen-map')">BACK</button>
        </div>
    </div>

    <script>
        let stars = parseInt(localStorage.getItem('dg_stars')) || 0;
        let unlocked = parseInt(localStorage.getItem('dg_unlocked')) || 1;
        const animalList = ["Elefant", "Leu", "Panda", "Tigru", "Cățeluș", "Pisicuță", "Zebra", "Iepuraș", "Maimuță", "Dinozaur", "Girafe", "Păun", "Ursuleț", "Hamster", "Papagal"];
        let pieces = [];
        let curImg = "";

        // --- MAP LOGIC ---
        function initMap() {
            const container = document.getElementById('levels-path');
            container.innerHTML = '';
            animalList.forEach((name, i) => {
                const lvl = i + 1;
                const node = document.createElement('div');
                node.className = `level-node ${lvl < unlocked ? 'level-unlocked' : (lvl === unlocked ? 'level-current' : '')}`;
                node.style.marginLeft = (i % 2 === 0) ? '15%' : '65%';
                node.innerText = lvl <= unlocked ? lvl : '🔒';
                node.id = `node-${lvl}`;
                node.onclick = () => { if(lvl <= unlocked) startLevel(lvl); };
                container.appendChild(node);
            });
            updateUI();
            setTimeout(movePenguin, 200);
        }

        function movePenguin() {
            const currentNode = document.getElementById(`node-${unlocked}`);
            const avatar = document.getElementById('penguin-avatar');
            if(currentNode && avatar) {
                avatar.style.top = (currentNode.offsetTop - 80) + 'px';
                avatar.style.left = (currentNode.offsetLeft - 15) + 'px';
                avatar.classList.add('wobble-anim');
                setTimeout(() => avatar.classList.remove('wobble-anim'), 700);
                currentNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // --- GAME LOGIC (DRAG & DROP FIX) ---
        function startLevel(id) {
            const name = animalList[id-1];
            document.getElementById('animal-msg').innerText = `✨ Animalul este: ${name}! ✨`;
            // Forțăm o dimensiune clară în prompt pentru AI
            curImg = `https://image.pollinations.ai/prompt/cute_cartoon_${name}_bright_colors_for_kids_square_image?width=315&height=315&seed=${id}`;
            showScreen('screen-game');
            
            // Preload securizat
            const imgPreload = new Image();
            imgPreload.crossOrigin = "Anonymous"; // Previne problemele de securitate la crop
            imgPreload.src = curImg;
            imgPreload.onload = setupPuzzle;
            imgPreload.onerror = () => { alert("Eroare la încărcarea imaginii. Mai încearcă!"); showScreen('screen-map'); };
        }

        function setupPuzzle() {
            const slotsContainer = document.getElementById('puzzle-slots');
            const piecesContainer = document.getElementById('pieces-container');
            slotsContainer.innerHTML = '';
            piecesContainer.innerHTML = ''; // Curățăm piesele vechi

            pieces = [0,1,2,3,4,5,6,7,8];
            shuffleArray(pieces);

            // Cream gridul de slots
            for(let i=0; i<9; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.dataset.index = i;
                slotsContainer.appendChild(slot);
            }

            // Cream piesele fizice și le punem în pieces-container
            pieces.forEach((pieceIndex, i) => {
                const p = document.createElement('div');
                p.className = 'piece';
                p.dataset.correctIndex = pieceIndex;
                p.style.backgroundImage = `url('${curImg}')`;
                
                const r = Math.floor(pieceIndex / 3);
                const c = pieceIndex % 3;
                p.style.backgroundPosition = `-${c * 105}px -${r * 105}px`;

                // Poziționare inițială în containerul de jos (pe 'masă')
                p.style.top = (Math.floor(i/3) * 115) + 'px';
                p.style.left = ((i%3) * 115) + 'px';
                p.dataset.initialX = p.style.left;
                p.dataset.initialY = p.style.top;

                initDrag(p);
                piecesContainer.appendChild(p);
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- DRAG SYSTEM FIX ---
        function initDrag(el) {
            let startX, startY, initialX, initialY, active = false;

            el.addEventListener('touchstart', dragStart, {passive: false});
            el.addEventListener('touchend', dragEnd);
            el.addEventListener('touchmove', drag, {passive: false});

            function dragStart(e) {
                active = true;
                el.style.zIndex = "1000";
                el.style.transition = "none"; // Dezactivăm tranzițiile în timpul drag-ului
                
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                initialX = el.offsetLeft;
                initialY = el.offsetTop;
            }

            function drag(e) {
                if (!active) return;
                e.preventDefault(); // Previne scroll-ul paginii
                const touch = e.touches[0];
                const curX = touch.clientX;
                const curY = touch.clientY;
                
                el.style.left = (initialX + curX - startX) + 'px';
                el.style.top = (initialY + curY - startY) + 'px';
            }

            function dragEnd(e) {
                if (!active) return;
                active = false;
                el.style.zIndex = "10";
                el.style.transition = "transform 0.1s"; // Reactivăm tranzițiile

                const elBounds = el.getBoundingClientRect();
                const elCenterX = elBounds.left + 52;
                const elCenterY = elBounds.top + 52;
                
                let droppedOnSlot = false;
                const slotsContainer = document.getElementById('puzzle-slots');
                const scBounds = slotsContainer.getBoundingClientRect();

                // Verificăm dacă piesa e dropped în zona gridului
                document.querySelectorAll('.slot').forEach(slot => {
                    const sb = slot.getBoundingClientRect();
                    if (elCenterX > sb.left && elCenterX < sb.right && elCenterY > sb.top && elCenterY < sb.bottom) {
                        droppedOnSlot = true;
                        
                        const piecesContainer = document.getElementById('pieces-container');
                        const pcBounds = piecesContainer.getBoundingClientRect();
                        
                        // Calculăm poziția finală RELATIVĂ la pieces-container (unde locuiește piesa)
                        const finalX = (sb.left - pcBounds.left);
                        const finalY = (sb.top - pcBounds.top);

                        el.style.left = finalX + 'px';
                        el.style.top = finalY + 'px';
                        el.dataset.currentSlot = slot.dataset.index;
                        
                        setTimeout(checkWinCondition, 300);
                    }
                });

                if (!droppedOnSlot) {
                    // Dacă e dropped afară, o ducem înapoi pe 'masă' (în pieces-container)
                    // Dacă era deja pe un slot, o ducem la poziția inițială din dataset
                    if(el.dataset.currentSlot >= 0) {
                        el.style.left = el.dataset.initialX;
                        el.style.top = el.dataset.initialY;
                    } else {
                        // Dacă era pe masă și a fost drag-uită tot pe masă, o lăsăm acolo
                        // sau o ducem la initial (alegem initial pentru ordine)
                         el.style.left = el.dataset.initialX;
                         el.style.top = el.dataset.initialY;
                    }
                    el.dataset.currentSlot = -1;
                }
            }
        }

        function checkWinCondition() {
            const piecesOnGrid = document.querySelectorAll('.piece[data-current-slot]');
            if (piecesOnGrid.length < 9) return; // Nu sunt toate pe grid

            let allCorrect = true;
            piecesOnGrid.forEach(p => {
                if (p.dataset.currentSlot != p.dataset.correctIndex) {
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                stars += 15;
                unlocked++;
                localStorage.setItem('dg_stars', stars);
                localStorage.setItem('dg_unlocked', unlocked);
                setTimeout(() => {
                    alert("🎉 BRAVO! Ai pus toate piesele corect!");
                    showScreen('screen-map');
                    initMap();
                }, 400);
            }
        }

        // --- UI HELPERS ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-map') setTimeout(movePenguin, 400);
        }
        function updateUI() { document.getElementById('stars-val').innerText = stars; }
        function claimDaily() { stars += 50; updateUI(); alert("🎁 50 Stele!"); }

        initMap();
    </script>
</body>
</html>
