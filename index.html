<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pingu & Friends: Marea Aventură</title>
    <style>
        :root { --p-blue: #00A8FF; --p-pink: #FF4D91; --p-green: #4CD137; --p-purple: #9c27b0; }
        html, body { 
            overscroll-behavior: none; overflow: hidden; position: fixed; 
            width: 100%; height: 100%; margin: 0; font-family: 'Arial Rounded MT Bold', sans-serif;
            background: #E0F7FA; touch-action: none; 
        }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; }
        .active { display: flex; }

        /* Harta cu Scroll */
        #map-container { width: 100%; flex-grow: 1; position: relative; background: #b2ebf2; overflow-y: auto; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
        .level-node { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border: 5px solid #ccc; position: relative; margin: 25px auto; color: #999; z-index: 5; transition: 0.3s; }
        .level-unlocked { border-color: var(--p-blue); color: var(--p-blue); box-shadow: 0 4px 0 #0086cc; }
        .level-current { border-color: var(--p-green); background: var(--p-green); color: white; transform: scale(1.1); box-shadow: 0 0 15px var(--p-green); }
        
        #dynamic-avatar {
            position: absolute; width: 65px; height: 65px; z-index: 10;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
            pointer-events: none;
        }

        /* Puzzle & Game */
        #game-area { position: relative; width: 320px; height: 100%; padding-top: 10px; }
        #puzzle-slots { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; background: rgba(255,255,255,0.4); padding: 8px; border-radius: 15px; border: 5px solid white; }
        .slot { width: 100px; height: 100px; background: rgba(255,255,255,0.3); border-radius: 8px; }
        .piece { width: 100px; height: 100px; background-size: 300px 300px; border-radius: 10px; position: absolute; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.3); touch-action: none; }

        /* UI Pop-up */
        #win-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 30px; border: 6px solid var(--p-green); text-align: center; z-index: 9999; width: 260px; box-shadow: 0 0 100px rgba(0,0,0,0.4); }
        .top-bar { width: 100%; height: 50px; background: white; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 1000; }
        .btn { padding: 10px 20px; border: none; border-radius: 20px; font-weight: bold; color: white; background: var(--p-blue); cursor: pointer; }
    </style>
</head>
<body>

    <div id="win-popup">
        <h2 style="color: var(--p-green); margin: 0;">🎉 EXCELENT! 🎉</h2>
        <p id="win-msg">Ai terminat nivelul!</p>
        <button class="btn" style="background: var(--p-green);" onclick="closeWinPopup()">ÎNAPOI LA HARTĂ</button>
    </div>

    <div class="top-bar">
        <div id="category-label" style="font-size: 14px; font-weight: bold; color: var(--p-purple);">Harta Aventurii</div>
        <div style="font-size: 18px;">⭐ <span id="stars-val">0</span></div>
        <button class="btn" onclick="showScreen('screen-map')">HARTĂ</button>
    </div>

    <div id="screen-map" class="screen active">
        <div id="map-container">
            <div id="dynamic-avatar"></div>
            <div id="levels-path"></div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div id="level-info" style="text-align: center; margin: 10px;">
            <div id="cur-cat" style="font-size: 12px; color: #666;"></div>
            <div id="cur-name" style="font-size: 20px; color: var(--p-pink); font-weight: bold;"></div>
        </div>
        <div id="game-area">
            <div id="puzzle-slots"></div>
        </div>
    </div>

    <script>
        // CONFIGURARE AVATARE PE CATEGORII
        const avatars = {
            "Sălbatice": "https://cdn-icons-png.flaticon.com/512/2823/2823055.png", // Pinguin
            "Domestice": "https://cdn-icons-png.flaticon.com/512/616/616408.png",  // Cățel
            "Pasări": "https://cdn-icons-png.flaticon.com/512/2503/2503830.png",     // Papagal
            "Subacvatice": "https://cdn-icons-png.flaticon.com/512/2123/2123714.png" // Pește
        };

        // BAZA DE DATE NIVELE (Exemplu extins - Adaugă până la 120 aici)
        const levels = [];
        const cats = ["Sălbatice", "Domestice", "Pasări", "Subacvatice"];
        const imgs = {
            "Sălbatice": "https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=300",
            "Domestice": "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300",
            "Pasări": "https://images.unsplash.com/photo-1552728089-57bdde30eba3?w=300",
            "Subacvatice": "https://images.unsplash.com/photo-1524704654690-b56c05c78a00?w=300"
        };

        // Generăm automat 120 de nivele (30 per categorie) pentru test
        cats.forEach(c => {
            for(let i=1; i<=30; i++) {
                levels.push({ name: `${c} #${i}`, cat: c, img: imgs[c] + "&sig=" + c + i });
            }
        });

        let stars = parseInt(localStorage.getItem('pq_stars')) || 0;
        let unlocked = parseInt(localStorage.getItem('pq_unlocked')) || 1;

        function initMap() {
            const path = document.getElementById('levels-path');
            path.innerHTML = '';
            levels.forEach((l, i) => {
                const n = document.createElement('div');
                const num = i + 1;
                n.className = `level-node ${num < unlocked ? 'level-unlocked' : (num === unlocked ? 'level-current' : '')}`;
                n.innerText = num <= unlocked ? num : '🔒';
                n.id = `node-${num}`;
                n.onclick = () => { if(num <= unlocked) startLevel(num); };
                path.appendChild(n);
            });
            document.getElementById('stars-val').innerText = stars;
            updateAvatar();
        }

        function updateAvatar() {
            const node = document.getElementById(`node-${unlocked}`);
            const av = document.getElementById('dynamic-avatar');
            if(node && av) {
                const curLevel = levels[unlocked - 1];
                av.style.backgroundImage = `url('${avatars[curLevel.cat]}')`;
                av.style.top = (node.offsetTop - 5) + 'px';
                av.style.left = (node.offsetLeft - 2) + 'px';
                node.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function startLevel(id) {
            const l = levels[id-1];
            document.getElementById('cur-cat').innerText = "CATEGORIA: " + l.cat;
            document.getElementById('cur-name').innerText = l.name;
            showScreen('screen-game');
            setupPuzzle(l.img);
        }

        function setupPuzzle(img) {
            const area = document.getElementById('game-area');
            document.querySelectorAll('.piece').forEach(p => p.remove());
            const slots = document.getElementById('puzzle-slots');
            slots.innerHTML = '';

            for(let i=0; i<9; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                s.dataset.idx = i;
                slots.appendChild(s);
            }

            let order = [0,1,2,3,4,5,6,7,8].sort(() => Math.random() - 0.5);
            order.forEach((pIdx, i) => {
                const p = document.createElement('div');
                p.className = 'piece';
                p.dataset.correct = pIdx;
                p.style.backgroundImage = `url('${img}')`;
                p.style.backgroundPosition = `-${(pIdx%3)*100}px -${Math.floor(pIdx/3)*100}px`;
                p.style.top = (340 + Math.floor(i/3) * 110) + 'px';
                p.style.left = (5 + (i%3) * 110) + 'px';
                
                let sX, sY, iX, iY;
                p.addEventListener('touchstart', (e) => {
                    const t = e.touches[0]; sX = t.clientX; sY = t.clientY;
                    iX = p.offsetLeft; iY = p.offsetTop; p.style.zIndex = 1000;
                }, {passive: false});

                p.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const t = e.touches[0];
                    p.style.left = (iX + (t.clientX - sX)) + 'px';
                    p.style.top = (iY + (t.clientY - sY)) + 'px';
                }, {passive: false});

                p.addEventListener('touchend', () => {
                    p.style.zIndex = 100;
                    const r = p.getBoundingClientRect();
                    const cx = r.left + 50, cy = r.top + 50;
                    let hit = false;
                    document.querySelectorAll('.slot').forEach(s => {
                        const sr = s.getBoundingClientRect();
                        if(cx > sr.left && cx < sr.right && cy > sr.top && cy < sr.bottom) {
                            const ar = area.getBoundingClientRect();
                            p.style.left = (sr.left - ar.left) + 'px';
                            p.style.top = (sr.top - ar.top) + 'px';
                            p.dataset.slot = s.dataset.idx;
                            hit = true; checkWin();
                        }
                    });
                    if(!hit) p.dataset.slot = -1;
                });
                area.appendChild(p);
            });
        }

        function checkWin() {
            let win = true;
            const ps = document.querySelectorAll('.piece');
            ps.forEach(p => { if(p.dataset.slot != p.dataset.correct) win = false; });
            if(win && ps.length === 9) {
                document.getElementById('win-popup').style.display = 'block';
                if(unlocked < levels.length) unlocked++;
                stars += 10;
                localStorage.setItem('pq_stars', stars);
                localStorage.setItem('pq_unlocked', unlocked);
            }
        }

        function closeWinPopup() {
            document.getElementById('win-popup').style.display = 'none';
            showScreen('screen-map');
            initMap();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'screen-map') setTimeout(updateAvatar, 100);
        }

        initMap();
        // Blocare scroll accidental pe body
        document.addEventListener('touchmove', (e) => { if(e.target.id !== 'map-container') e.preventDefault(); }, {passive: false});
    </script>
</body>
</html>
